<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <style>
      .scale { fill: #0a5a62; }
      .plane { fill: #1aa990; }
    </style>
  </defs>

  <!-- Balanza de justicia -->
  <g class="scale">
    <!-- Base -->
    <rect x="75" y="145" width="50" height="8" rx="3"/>
    <!-- Pilar central -->
    <rect x="97" y="68" width="6" height="77" rx="2"/>
    <!-- Barra horizontal -->
    <rect x="56" y="66" width="88" height="5" rx="2.5"/>
    <!-- Colgante izquierdo -->
    <line x1="64" y1="68" x2="58" y2="78" stroke="#0a5a62" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Plato izquierdo -->
    <path d="M 46 78 Q 46 88, 58 90 Q 70 88, 70 78 Z" opacity="0.9"/>
    <!-- Colgante derecho -->
    <line x1="136" y1="68" x2="142" y2="78" stroke="#0a5a62" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Plato derecho (más alto = balance) -->
    <path d="M 130 74 Q 130 84, 142 86 Q 154 84, 154 74 Z" opacity="0.9"/>
    <!-- Nudo superior -->
    <circle cx="100" cy="62" r="6"/>
  </g>

  <!-- Avión de papel -->
  <g class="plane">
    <path d="M 100 100 L 122 112 L 114 118 L 100 108 L 86 118 L 78 112 Z"/>
    <path d="M 100 94 L 128 116 L 118 122 L 100 105 L 82 122 L 72 116 Z" opacity="0.75"/>
  </g>
</svg>
